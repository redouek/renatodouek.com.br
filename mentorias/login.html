
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Mentorado</title>
  <style>
    body {
      background-color: #333;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background-color: #1a1a1a;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }

    .login-container img {
      max-width: 140px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      color: #FFCE00;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
      color: #FFCE00;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background-color: #2a2a2a;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .button {
      width: 100%;
      padding: 0.75rem;
      background-color: #FFCE00;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 32px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .error-message {
      color: #FF4C4C;
      background-color: #fff;
      border-left: 4px solid #FF4C4C;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .success-message {
      color: #00cc66;
      background-color: #fff;
      border-left: 4px solid #00cc66;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://renatodouek.com.br/rd_pb_logo.png" alt="Logo" />
    <h1>Login do Mentorado</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required />
      </div>
      <div class="input-group">
        <input type="password" id="senha" placeholder="Senha" required />
        <span id="toggle-password" class="toggle-password">👁️</span>
      </div>
      <button type="submit" class="button">Entrar</button>
      <div id="mensagem" class="error-message"></div>
      <div id="sucesso" class="success-message"></div>
    </form>
  </div>


<script>
  document.querySelector("form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const cpf = document.getElementById("cpf").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const erro = document.getElementById("mensagem-erro");

    try {
      const response = await fetch(
        "https://script.google.com/macros/s/AKfycbx0Z3daHTDVGJ4FhyMpTtXd_tMSfSLUwKQnHWSnL0WDNphqYkOAzx4_6Kx0ewJ1vUrSCQ/exec?cpf=" +
          encodeURIComponent(cpf)
      );
      const data = await response.json();

      if (!data || !data.senha || !data.cpf) {
        erro.textContent = "Mentorado não encontrado.";
        erro.style.display = "block";
        return;
      }

      if (String(data.cpf).trim() === cpf && String(data.senha).trim() === senha) {
        localStorage.setItem("usuarioLogado", JSON.stringify(data));
        window.location.href = "painel.html";
      } else {
        erro.textContent = "Senha incorreta.";
        erro.style.display = "block";
      }
    } catch (err) {
      erro.textContent = "Erro ao verificar login. Tente novamente.";
      erro.style.display = "block";
      console.error(err);
    }
  });

  // Alternar visibilidade da senha
  const olho = document.getElementById("toggle-password");
  const campoSenha = document.getElementById("senha");

  olho.addEventListener("click", () => {
    const type = campoSenha.getAttribute("type") === "password" ? "text" : "password";
    campoSenha.setAttribute("type", type);
    olho.textContent = type === "password" ? "👁️" : "🙈";
  });
</script>

</body>
</html>
